<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Browser History Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>
    <main class="box"></main>
    <h1>✅ Browser History Quiz</h1>


    <form class="box">
        <div class="quiz-item box">
            <label for="q1">1. What is the name of the popular browser made by Google?</label>
            <input type="text" id="q1" name="q1">
        </div>

        <div class="quiz-item box">
            <label for="q2">2. Which device do you usually use to click on links?</label>
            <textarea id="q2" name="q2" rows="3"></textarea>
        </div>
        <div class="quiz-item box">
            <label for="q3">3. Name one website you visit every day:</label>
            <select id="q3" name="q3">
                <option value="a">A. Chrome</option>
                <option value="b">B. Mozila Foundation</option>
                <option value="c">C. Apple</option>
                <option value="d">D. Microsoft</option>


            </select>
        </div>
        <div class="quiz-item box">
            <label for="q3">4. How many "W"s are in a website address (World Wide Web)?</label>
            <code class="box"></code>

            <input type="number" id="q4">
        </div>
        <button type="submit">Submit Quiz</button>


    </form>
    </main>
</body>

</html>

<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 130 - White Water Rafting - About Us</title>
    <meta name="description"
      content="Learn more about our history an the adventure that wait for you.">
    <meta name="author" content="Emanoel R Morais">
    <meta name="keywords" content="rafting, adventure, history, white water">
    <link rel="stylesheet" href="styles/rafting2.css">
</head>

<body>
    <header>
        <img src="images/splash.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>


    <main>
        <h1>Contact Us</h1>

        <div class="company-info">
            <img src="images/raftinghero4.jpg" alt="Rafting adventure background"
              class="contact-hero">
            <p><strong>Address:</strong> 123 Main River Street, Kolob, California</p>
            <p><strong>Phone:</strong> +1 941 123 9987</p>
            <p><strong>Email:</strong> info@splashrafting.com</p>

            <div class="map">
                <iframe class="map-frame" src="https://www.google.com/maps/embed?pb=..." width="600"
                  height="450" allowfullscreen="" loading="lazy" title="Store Location"></iframe>
            </div>
        </div>

        <section>

            <h2>Send us a Message</h2>
            <form action="#" method="post">
                <div class="form-item">
                    <label for="full_name">Name:</label>
                    <input type="text" id="full_name" name="full_name" required>
                </div>

                <div class="form-item">
                    <label for="user_email">Email:</label>
                    <input type="email" id="user_email" name="user_email" required>
                </div>


                <fieldset>
                    <legend>Purpose of Message:</legend>
                    <label><input type="radio" id="general" name="purpose" value="general" checked>
                        General Inquiry</label>
                    <label><input type="radio" id="reservation" name="purpose" value="reservation">
                        Reservation Question</label>
                    <label><input type="radio" id="feedback" name="purpose" value="feedback">
                        Website
                        Feedback</label>

                </fieldset>

                <div class="form-item">
                    <label for="message_text">Message:</label>
                    <textarea id="message_text" name="message_text" rows="4" required></textarea>
                </div>

                <div class="form-item">
                    <label for="newsletter">
                        <input type="checkbox" id="newsletter" name="subscribe" value="yes"> Please
                        subscribe me to the monthly newsletter
                    </label>
                </div>

                <button type="submit">Submit Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>© 2026 Emanoel R Morais | All rights reserved | White Water Rafting</p>

        <!-- meta description -->
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="facebook-icon" width="34"></a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.jpg" alt="linkedin-icon" width="35">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="instagram-icoon" width="36"></a>

        </nav>
    </footer>

</body>

</html>

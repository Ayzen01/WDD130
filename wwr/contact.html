<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting</title>
    <meta name="description"
      content="Contact information and message form for White Water Rafting Company">
    <meta name="author" content="Emanoel R Morais">
    <meta name="keywords" content="rafting, adventure, history, white water">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/splash.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>


    <main>
        <h1>Contact Us</h1>
        <div class="company-info">
            <p><strong>Address:</strong> 123 Main River Street, Kolob, California</p>
            <p><strong>Phone:</strong> +1 981 123 9459</p>
            <p><strong>Email:</strong> info@whitewater.com</p>

            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=YOUR_EMBED_LINK_HERE" width="600"
                  height="450" allowfullscreen="" loading="lazy"></iframe>
            </div>
        </div>

        <section>
            <h2> Send us a mensage</h2>
            <form action="#" method="post">
                <div class="form_item">
                    <label for="user_name">Name</label>
                    <input type="text" id="user_name" name="" user_name" required>
                </div>


                <div class="form_item">
                    <p>Porpouse of Mensage:</p>
                    <label><input type="radio" name="purpose" value="general" checked> General
                        Inquiry</label>
                    <label><input type="radio" name="purpose" value="general" checked> Reservation
                        Question</label>
                    <label><input type="radio" name="purpose" value="general" checked> Website
                        Feedback</label>
                </div>

                <div class="form_item">
                    <label for="=mensage">Mensage</label>
                    <textarea id="mensage" name="mensage" rows="4" required></textarea>
                </div>

                <div class="form_item">
                    <label><input type="checkbox" name="subscribe" value="yes"> Please subscribe me
                        to the
                        monthly newsletter</label>
                </div>


                <button type="submit">Submit Mensage</button>
            </form>
        </section>

    </main>
    <footer>
        <p>© 2026 Emanoel R Morais | All rights reserved | White Water Rafting</p>

        <!-- meta description -->
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="facebook-icon" width="34"></a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="linkedin-icon" width="35">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="instagram-icoon" width="36"></a>

        </nav>
    </footer>

</body>

</html>
